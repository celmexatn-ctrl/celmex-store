<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1080"
  height="1920"
  viewBox="0 0 1080 1920"
>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="65%">
      <stop offset="0" stop-color="#103B72"/>
      <stop offset="0.42" stop-color="#07182E"/>
      <stop offset="1" stop-color="#02050B"/>
    </radialGradient>

    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4CC2FF"/>
      <stop offset="0.48" stop-color="#0B84FF"/>
      <stop offset="1" stop-color="#0047FF"/>
    </linearGradient>

    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>

  <circle
    cx="540"
    cy="940"
    r="395"
    fill="none"
    stroke="#0B84FF"
    stroke-width="4"
    stroke-opacity="0.17"
  />

  <circle
    cx="540"
    cy="940"
    r="310"
    fill="none"
    stroke="#4CC2FF"
    stroke-width="3"
    stroke-opacity="0.12"
  />

  <image
    href="logo-next.svg"
    x="190"
    y="480"
    width="700"
    height="700"
  />

  <text
    x="540"
    y="1340"
    text-anchor="middle"
    fill="#FFFFFF"
    font-family="Arial, Helvetica, sans-serif"
    font-size="40"
    font-weight="700"
    letter-spacing="3"
  >COMPRA INTELIGENTE, VIVE MEJOR.</text>

  <rect
    x="330"
    y="1460"
    width="420"
    height="7"
    rx="4"
    fill="#14243A"
  />

  <rect
    x="330"
    y="1460"
    width="270"
    height="7"
    rx="4"
    fill="url(#blue)"
    filter="url(#glow)"
  />

  <text
    x="540"
    y="1535"
    text-anchor="middle"
    fill="#6991BC"
    font-family="Arial, Helvetica, sans-serif"
    font-size="26"
    letter-spacing="8"
  >E&amp;D MARKET NEXT</text>
</svg>
