<svg
  xmlns="http://www.w3.org/2000/svg"
  width="512"
  height="512"
  viewBox="0 0 512 512"
>
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4CC2FF"/>
      <stop offset="0.5" stop-color="#0B84FF"/>
      <stop offset="1" stop-color="#0047FF"/>
    </linearGradient>

    <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#AEBFD0"/>
    </linearGradient>

    <radialGradient id="bg">
      <stop offset="0" stop-color="#102A50"/>
      <stop offset="1" stop-color="#02050B"/>
    </radialGradient>

    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect
    x="12"
    y="12"
    width="488"
    height="488"
    rx="108"
    fill="none"
    stroke="#0B84FF"
    stroke-opacity="0.45"
    stroke-width="5"
  />

  <g transform="translate(171 48)" fill="url(#blue)" filter="url(#glow)">
    <path d="M10 82 L0 20 L48 59 L85 0 L122 59 L170 20 L160 82 Z"/>
    <rect x="15" y="84" width="140" height="20" rx="10"/>
    <circle cx="0" cy="20" r="8"/>
    <circle cx="85" cy="0" r="8"/>
    <circle cx="170" cy="20" r="8"/>
  </g>

  <text
    x="256"
    y="300"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="150"
    font-weight="900"
    letter-spacing="-12"
    fill="url(#silver)"
  >E<tspan fill="url(#blue)">&amp;</tspan>D</text>

  <g
    transform="translate(174 325)"
    fill="none"
    stroke="url(#blue)"
    stroke-width="14"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  >
    <path d="M0 0 H36 L56 91 H145 L164 29 H50"/>
    <path d="M61 58 H150"/>
    <circle cx="76" cy="118" r="10" fill="#0B84FF"/>
    <circle cx="137" cy="118" r="10" fill="#0B84FF"/>
  </g>
</svg>
